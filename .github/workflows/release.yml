name: CI & Release

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.4.0'

      - name: Build release artifacts
        run: gradle :app:assembleRelease :client:assembleRelease :demo:assembleRelease

      # --- Signing (tag push only) ---

      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing-keystore.jks

      - name: Sign App APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BUILD_TOOLS/zipalign" -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks signing-keystore.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            app/build/outputs/apk/release/app-release.apk
          "$BUILD_TOOLS/apksigner" verify app/build/outputs/apk/release/app-release.apk

      - name: Sign Demo APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BUILD_TOOLS/zipalign" -v -p 4 demo/build/outputs/apk/release/demo-release-unsigned.apk demo/build/outputs/apk/release/demo-release.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks signing-keystore.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            demo/build/outputs/apk/release/demo-release.apk
          "$BUILD_TOOLS/apksigner" verify demo/build/outputs/apk/release/demo-release.apk

      - name: Sign Client AAR
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          UNSIGNED_AAR="client/build/outputs/aar/client-release.aar"
          SIGNED_AAR="client/build/outputs/aar/client-release-signed.aar"
          jarsigner \
            -keystore signing-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -signedjar "$SIGNED_AAR" \
            "$UNSIGNED_AAR" \
            "${{ secrets.ANDROID_KEY_ALIAS }}"
          jarsigner -verify "$SIGNED_AAR"

      # --- Publish to GitHub Release ---

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            demo/build/outputs/apk/release/demo-release.apk
            client/build/outputs/aar/client-release-signed.aar
          generate_release_notes: true
          overwrite_files: true
