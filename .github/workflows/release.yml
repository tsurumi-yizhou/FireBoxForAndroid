name: CI & Release

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build release artifacts
        uses: gradle/actions/setup-gradle@v5
        with:
          arguments: :app:assembleRelease :client:assembleRelease :demo:assembleRelease

      # --- Signing (tag push only) ---

      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing-keystore.jks

      - name: Sign App APK
        if: startsWith(github.ref, 'refs/tags/')
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Sign Demo APK
        if: startsWith(github.ref, 'refs/tags/')
        id: sign_demo
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: demo/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Sign Client AAR
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          UNSIGNED_AAR="client/build/outputs/aar/client-release.aar"
          SIGNED_AAR="client/build/outputs/aar/client-release-signed.aar"
          jarsigner \
            -keystore signing-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -signedjar "$SIGNED_AAR" \
            "$UNSIGNED_AAR" \
            "${{ secrets.ANDROID_KEY_ALIAS }}"
          jarsigner -verify "$SIGNED_AAR"

      # --- Publish to GitHub Release ---

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            ${{ steps.sign_demo.outputs.signedReleaseFile }}
            client/build/outputs/aar/client-release-signed.aar
          generate_release_notes: true
          overwrite_files: true
